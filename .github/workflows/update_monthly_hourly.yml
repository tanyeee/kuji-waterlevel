name: update_monthly_hourly

on:
  workflow_dispatch:
  schedule:
    - cron: "15 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update recent hourly data
        run: |
          python scripts/update_recent_from_monthly_page.py
          python scripts/merge_recent_into_historical.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/recent_hourly.json data/historical_hourly.json
          git diff --cached --quiet || git commit -m "Auto update monthly hourly data"
          git push
