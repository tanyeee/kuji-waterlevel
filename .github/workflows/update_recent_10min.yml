name: update_recent_10min

on:
  workflow_dispatch:
  schedule:
    - cron: "7,17,27,37,47,57 * * * *"

permissions:
  contents: write

concurrency:
  group: waterlevel-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Update recent 10-minute data
        run: |
          python scripts/update_recent_10min_from_kawabou.py --keep-hours 168

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/stations
          if ! git diff --cached --quiet; then
            git commit -m "Auto update recent 10-minute data"
            git pull --rebase origin "$GITHUB_REF_NAME"
            git push
          fi
